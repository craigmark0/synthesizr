services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synthesizr}
      POSTGRES_USER: ${POSTGRES_USER:-synthesizr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synthesizr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthesizr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  test:
    build: .
    command: pytest tests/ -v
    env_file: .env
    environment:
      GOOGLE_API_KEY: test-key
      DATABASE_URL: postgresql://synthesizr:synthesizr@postgres:5432/synthesizr
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test

volumes:
  pgdata:
