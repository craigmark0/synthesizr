services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: synthesizr
      POSTGRES_USER: synthesizr
      POSTGRES_PASSWORD: synthesizr
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthesizr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
